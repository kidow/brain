<body>
<h1>가타카나 탁음·반탁음 드릴</h1>
<div class="sub">탁음·반탁음 25자(ガ~ポ행) · 46자 기본 드릴과 별도 · 간격 반복(SM-2) · 진행 상태는 이 브라우저에만 저장됩니다</div>

<a class="ref-link" href="/sheets/일본어/가타카나_치트시트.html">📖 오십음도 표 다시 보기 (치트시트)</a>

<div class="progress-wrap">
  <span>오늘 남은 카드: <b id="remainingCount">-</b></span>
  <span>전체 <span id="totalCount">-</span>자</span>
</div>

<div class="stats-wrap">
  <div class="stats-row">
    <span class="new">New <b id="statNew">-</b></span>
    <span class="learning">Learning <b id="statLearning">-</b></span>
    <span class="mature">Mature <b id="statMature">-</b></span>
    <span>Mature 비율 <b id="statMaturePct" style="color:#22c55e">-</b></span>
  </div>
  <div class="stats-bar">
    <div class="seg-mature" id="barMature"></div>
    <div class="seg-learning" id="barLearning"></div>
    <div class="seg-new" id="barNew"></div>
  </div>
</div>

<div id="cardArea"></div>

<div class="note">
  진행 상태(간격·난이도)는 localStorage에만 저장됩니다. 다른 기기·브라우저에서는 이어지지 않습니다.
  로마자 표기는 헵번식(Hepburn romanization) 기준이며, 이 표기만 정답으로 인정합니다.
</div>

<script>
const STORAGE_KEY = "drill:일본어_가타카나_탁음";
const DATA_FILE = "일본어_가타카나_탁음.json";
const MATURE_DAYS = 21; // Anki 관례: interval 21일 이상 = 장기기억 안착(mature)
const FAST_SEC = 1.5;   // 이보다 빠르면 Easy
const OK_SEC = 3.5;     // 이보다 빠르면 Good, 그 이상이면 Hard

let items = [];
let state = {};
let queue = [];
let current = null;
let submitted = false;
let shownAt = 0;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function isDue(cardState) {
  if (!cardState) return true; // new card
  if (!cardState.due) return true;
  return cardState.due <= todayStr();
}

function buildQueue() {
  queue = items.filter((it) => isDue(state[it.id]));
  queue.sort(() => Math.random() - 0.5);
}

function sm2(cardState, quality) {
  let ef = cardState?.ef ?? 2.5;
  let repetitions = cardState?.repetitions ?? 0;
  let interval = cardState?.interval ?? 0;

  if (quality < 3) {
    repetitions = 0;
    interval = 1;
  } else {
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 6;
    else interval = Math.round(interval * ef);
    repetitions += 1;
  }

  ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (ef < 1.3) ef = 1.3;

  const dueDate = new Date();
  dueDate.setDate(dueDate.getDate() + interval);
  const due = dueDate.getFullYear() + "-" + String(dueDate.getMonth() + 1).padStart(2, "0") + "-" + String(dueDate.getDate()).padStart(2, "0");

  return { ef, repetitions, interval, due };
}

function renderCard() {
  const area = document.getElementById("cardArea");
  document.getElementById("remainingCount").textContent = queue.length;

  if (queue.length === 0) {
    area.innerHTML = '<div class="done"><b>오늘 복습 끝!</b>내일 다시 오세요.</div>';
    return;
  }

  current = queue[0];
  submitted = false;

  area.innerHTML = `
    <div class="card">
      <div class="glyph">${current.kana}</div>
      <div class="input-wrap">
        <input class="answer" id="answerInput" placeholder="로마자 입력 (예: ga)" autocomplete="off" autocapitalize="off" spellcheck="false" />
      </div>
      <button class="submit-btn" id="submitBtn">제출</button>
    </div>
  `;

  const input = document.getElementById("answerInput");
  input.focus();
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
  document.getElementById("submitBtn").addEventListener("click", submit);
  shownAt = Date.now();
}

function submit() {
  if (submitted) return;
  const input = document.getElementById("answerInput");
  const given = input.value.trim().toLowerCase();
  if (!given) {
    input.focus();
    return;
  }
  submitted = true;

  const elapsedSec = (Date.now() - shownAt) / 1000;
  const correct = given === current.romaji;

  let quality;
  if (!correct) quality = 0;
  else if (elapsedSec < FAST_SEC) quality = 5;
  else if (elapsedSec < OK_SEC) quality = 4;
  else quality = 3;

  const prev = state[current.id];
  state[current.id] = sm2(prev, quality);
  saveState();

  input.disabled = true;
  input.classList.add(correct ? "correct" : "wrong");
  document.getElementById("submitBtn").remove();

  const area = document.getElementById("cardArea");
  const card = area.querySelector(".card");
  const feedback = document.createElement("div");
  feedback.className = "feedback " + (correct ? "ok" : "no");
  feedback.innerHTML = correct
    ? `정답!<div class="audio-row"><button class="play-btn" id="playBtn">🔊</button><span>자동 재생됨</span></div>`
    : `<span class="my-answer">${given}</span> → <span class="correct-answer">${current.romaji}</span><div class="audio-row"><button class="play-btn" id="playBtn">🔊</button><span>자동 재생됨</span></div>`;
  card.appendChild(feedback);

  const nextBtn = document.createElement("button");
  nextBtn.className = "next-btn";
  nextBtn.textContent = "다음 →";
  nextBtn.addEventListener("click", next);
  card.appendChild(nextBtn);

  document.getElementById("playBtn").addEventListener("click", () => playAudio(current.kana));
  playAudio(current.kana);
  renderStats();
}

function next() {
  queue.shift();
  renderCard();
}

function playAudio(text) {
  const btn = document.getElementById("playBtn");
  if (!btn) return;
  btn.classList.add("playing");
  const url = "https://translate.google.com/translate_tts?ie=UTF-8&q=" + encodeURIComponent(text) + "&tl=ja&client=tw-ob&ttsspeed=0.85";
  const audio = new Audio(url);
  audio.addEventListener("ended", () => btn.classList.remove("playing"));
  audio.play().catch(() => {
    // CORS/network block — fall back to browser TTS
    try {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ja-JP";
      utter.onend = () => btn.classList.remove("playing");
      speechSynthesis.speak(utter);
    } catch {
      btn.classList.remove("playing");
    }
  });
}

function renderStats() {
  let newCount = 0, learningCount = 0, matureCount = 0;
  for (const it of items) {
    const s = state[it.id];
    if (!s) newCount++;
    else if (s.interval >= MATURE_DAYS) matureCount++;
    else learningCount++;
  }
  const total = items.length || 1;
  document.getElementById("statNew").textContent = newCount;
  document.getElementById("statLearning").textContent = learningCount;
  document.getElementById("statMature").textContent = matureCount;
  document.getElementById("statMaturePct").textContent = Math.round((matureCount / total) * 100) + "%";
  document.getElementById("barMature").style.width = (matureCount / total) * 100 + "%";
  document.getElementById("barLearning").style.width = (learningCount / total) * 100 + "%";
  document.getElementById("barNew").style.width = (newCount / total) * 100 + "%";
}

async function init() {
  const res = await fetch(DATA_FILE);
  items = await res.json();
  state = loadState();
  document.getElementById("totalCount").textContent = items.length;
  buildQueue();
  renderCard();
  renderStats();
}

init();
</script>
</body>
</html>
