<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<title>일본어 기초 어휘 드릴</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem;
  }
  h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
  .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.25rem; }
  .progress-wrap {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: #94a3b8;
  }
  .progress-wrap b { color: #60a5fa; }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0.75rem;
    cursor: pointer;
    user-select: none;
  }
  .expr { font-size: 2.4rem; font-weight: 600; }
  .reading { font-size: 1.1rem; color: #60a5fa; min-height: 1.4em; }
  .meaning { font-size: 1rem; color: #e2e8f0; min-height: 1.4em; }
  .hint { color: #94a3b8; font-size: 0.8rem; margin-top: 0.5rem; }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.6rem;
    margin-top: 1.25rem;
  }
  .buttons button {
    padding: 0.7rem 0.4rem;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .buttons button:disabled { opacity: 0.35; cursor: default; }
  .buttons button.again { border-color: #ef4444; color: #ef4444; }
  .buttons button.hard { border-color: #f59e0b; color: #f59e0b; }
  .buttons button.good { border-color: #60a5fa; color: #60a5fa; }
  .buttons button.easy { border-color: #22c55e; color: #22c55e; }
  .buttons button:not(:disabled):active { transform: scale(0.97); }
  .done {
    text-align: center;
    padding: 3rem 1rem;
    color: #94a3b8;
  }
  .done b { color: #60a5fa; font-size: 1.4rem; display: block; margin-bottom: 0.5rem; }
  .note {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #64748b;
    line-height: 1.5;
  }
  @media (max-width: 600px) {
    body { padding: 1rem 1rem; }
    .expr { font-size: 2rem; }
  }
  @media print {
    body { padding: 0.5cm; }
  }
</style>
</head>
<body>
<h1>일본어 기초 어휘 드릴</h1>
<div class="sub">JLPT N5 어휘 · 간격 반복(SM-2) · 진행 상태는 이 브라우저에만 저장됩니다</div>

<div class="progress-wrap">
  <span>오늘 남은 카드: <b id="remainingCount">-</b></span>
  <span>전체 <span id="totalCount">-</span>단어</span>
</div>

<div id="cardArea"></div>

<div class="note">
  진행 상태(간격·난이도)는 localStorage에만 저장됩니다. 다른 기기·브라우저에서는 이어지지 않습니다.
  단어 출처: <a href="https://github.com/elzup/jlpt-word-list" style="color:#60a5fa">elzup/jlpt-word-list</a> (JLPT N5)
</div>

<script>
const STORAGE_KEY = "drill:일본어_기초_어휘";
const NEW_CARDS_PER_DAY = 20;

let words = [];
let state = {};
let queue = [];
let current = null;
let revealed = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function isDue(cardState) {
  if (!cardState) return true; // new card
  if (!cardState.due) return true;
  return cardState.due <= todayStr();
}

function buildQueue() {
  const due = [];
  const fresh = [];
  for (const w of words) {
    const s = state[w.id];
    if (!s) fresh.push(w);
    else if (isDue(s)) due.push(w);
  }
  // shuffle due lightly, cap new cards
  fresh.sort(() => Math.random() - 0.5);
  due.sort(() => Math.random() - 0.5);
  queue = due.concat(fresh.slice(0, NEW_CARDS_PER_DAY));
  queue.sort(() => Math.random() - 0.5);
}

function sm2(cardState, quality) {
  let ef = cardState?.ef ?? 2.5;
  let repetitions = cardState?.repetitions ?? 0;
  let interval = cardState?.interval ?? 0;

  if (quality < 3) {
    repetitions = 0;
    interval = 1;
  } else {
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 6;
    else interval = Math.round(interval * ef);
    repetitions += 1;
  }

  ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (ef < 1.3) ef = 1.3;

  const dueDate = new Date();
  dueDate.setDate(dueDate.getDate() + interval);
  const due = dueDate.getFullYear() + "-" + String(dueDate.getMonth() + 1).padStart(2, "0") + "-" + String(dueDate.getDate()).padStart(2, "0");

  return { ef, repetitions, interval, due };
}

function renderCard() {
  const area = document.getElementById("cardArea");
  document.getElementById("remainingCount").textContent = queue.length;

  if (queue.length === 0) {
    area.innerHTML = '<div class="done"><b>오늘 복습 끝!</b>내일 다시 오세요.</div>';
    return;
  }

  current = queue[0];
  revealed = false;

  area.innerHTML = `
    <div class="card" id="cardEl">
      <div class="expr">${current.expression}</div>
      <div class="reading" id="readingEl"></div>
      <div class="meaning" id="meaningEl"></div>
      <div class="hint" id="hintEl">카드를 클릭해 답 보기</div>
    </div>
    <div class="buttons">
      <button class="again" id="btnAgain" disabled>Again</button>
      <button class="hard" id="btnHard" disabled>Hard</button>
      <button class="good" id="btnGood" disabled>Good</button>
      <button class="easy" id="btnEasy" disabled>Easy</button>
    </div>
  `;

  document.getElementById("cardEl").addEventListener("click", reveal);
  document.getElementById("btnAgain").addEventListener("click", () => answer(0));
  document.getElementById("btnHard").addEventListener("click", () => answer(3));
  document.getElementById("btnGood").addEventListener("click", () => answer(4));
  document.getElementById("btnEasy").addEventListener("click", () => answer(5));
}

function reveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById("readingEl").textContent = current.reading;
  document.getElementById("meaningEl").textContent = current.meaning;
  document.getElementById("hintEl").textContent = "";
  for (const id of ["btnAgain", "btnHard", "btnGood", "btnEasy"]) {
    document.getElementById(id).disabled = false;
  }
}

function answer(quality) {
  const prev = state[current.id];
  state[current.id] = sm2(prev, quality);
  saveState();
  queue.shift();
  renderCard();
}

async function init() {
  const res = await fetch("일본어_기초_어휘.json");
  words = await res.json();
  state = loadState();
  document.getElementById("totalCount").textContent = words.length;
  buildQueue();
  renderCard();
}

init();
</script>
</body>
</html>
