<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<title>일본어 기초 어휘 드릴</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem;
  }
  h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
  .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.25rem; }
  .progress-wrap {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: #94a3b8;
  }
  .progress-wrap b { color: #60a5fa; }
  .stats-wrap {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.75rem 0.9rem;
    margin-bottom: 1.25rem;
    font-size: 0.8rem;
    color: #94a3b8;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .stats-row span b { font-size: 0.95rem; }
  .stats-row .new b { color: #94a3b8; }
  .stats-row .learning b { color: #f59e0b; }
  .stats-row .mature b { color: #22c55e; }
  .stats-bar {
    height: 8px;
    border-radius: 4px;
    background: #0f172a;
    overflow: hidden;
    display: flex;
  }
  .stats-bar div { height: 100%; }
  .stats-bar .seg-mature { background: #22c55e; }
  .stats-bar .seg-learning { background: #f59e0b; }
  .stats-bar .seg-new { background: #334155; }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0.75rem;
    cursor: pointer;
    user-select: none;
  }
  .expr { font-size: 2.4rem; font-weight: 600; line-height: 1.8; }
  .expr ruby { ruby-align: center; }
  .expr rt { font-size: 0.9rem; font-weight: 400; color: #94a3b8; letter-spacing: 0.15em; padding-bottom: 0.3em; }
  .reading { font-size: 1.1rem; color: #60a5fa; min-height: 1.4em; }
  .meaning { font-size: 1rem; color: #e2e8f0; min-height: 1.4em; }
  .hint { color: #94a3b8; font-size: 0.8rem; margin-top: 0.5rem; }
  .play-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #334155;
    background: #0f172a;
    color: #60a5fa;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.25rem;
  }
  .play-btn:active { transform: scale(0.95); }
  .play-btn.playing { opacity: 0.6; }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.6rem;
    margin-top: 1.25rem;
  }
  .buttons button {
    padding: 0.7rem 0.4rem;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .buttons button:disabled { opacity: 0.35; cursor: default; }
  .buttons button.again { border-color: #ef4444; color: #ef4444; }
  .buttons button.hard { border-color: #f59e0b; color: #f59e0b; }
  .buttons button.good { border-color: #60a5fa; color: #60a5fa; }
  .buttons button.easy { border-color: #22c55e; color: #22c55e; }
  .buttons button:not(:disabled):active { transform: scale(0.97); }
  .buttons button small { display: block; font-size: 0.68rem; font-weight: 400; margin-top: 0.15rem; opacity: 0.8; }
  .criteria {
    margin-top: 0.75rem;
    font-size: 0.75rem;
    color: #64748b;
    line-height: 1.6;
  }
  .done {
    text-align: center;
    padding: 3rem 1rem;
    color: #94a3b8;
  }
  .done b { color: #60a5fa; font-size: 1.4rem; display: block; margin-bottom: 0.5rem; }
  .note {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #64748b;
    line-height: 1.5;
  }
  @media (max-width: 600px) {
    body { padding: 1rem 1rem; }
    .expr { font-size: 2rem; }
  }
  @media print {
    body { padding: 0.5cm; }
  }
</style>
</head>
<body>
<h1>일본어 기초 어휘 드릴</h1>
<div class="sub">JLPT N5 어휘 · 간격 반복(SM-2) · 진행 상태는 이 브라우저에만 저장됩니다</div>

<div class="progress-wrap">
  <span>오늘 남은 카드: <b id="remainingCount">-</b></span>
  <span>전체 <span id="totalCount">-</span>단어</span>
</div>

<div class="stats-wrap">
  <div class="stats-row">
    <span class="new">New <b id="statNew">-</b></span>
    <span class="learning">Learning <b id="statLearning">-</b></span>
    <span class="mature">Mature <b id="statMature">-</b></span>
    <span>Mature 비율 <b id="statMaturePct" style="color:#22c55e">-</b></span>
  </div>
  <div class="stats-bar">
    <div class="seg-mature" id="barMature"></div>
    <div class="seg-learning" id="barLearning"></div>
    <div class="seg-new" id="barNew"></div>
  </div>
</div>

<div id="cardArea"></div>

<div class="note">
  진행 상태(간격·난이도)는 localStorage에만 저장됩니다. 다른 기기·브라우저에서는 이어지지 않습니다.
  단어 출처: <a href="https://github.com/elzup/jlpt-word-list" style="color:#60a5fa">elzup/jlpt-word-list</a> (JLPT N5). 한국어 뜻은 원본 영어 뜻을 기계번역한 것으로, 오역이 있을 수 있습니다.
</div>

<script>
const STORAGE_KEY = "drill:일본어_기초_어휘";
const NEW_CARDS_PER_DAY = 20;
const MATURE_DAYS = 21; // Anki 관례: interval 21일 이상 = 장기기억 안착(mature)

let words = [];
let state = {};
let queue = [];
let current = null;
let revealed = false;

// 히라가나/가타카나 → 로마자(헵번식) 변환표
const KANA_ROMAJI = {
  "あ":"a","い":"i","う":"u","え":"e","お":"o",
  "か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko",
  "さ":"sa","し":"shi","す":"su","せ":"se","そ":"so",
  "た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to",
  "な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no",
  "は":"ha","ひ":"hi","ふ":"fu","へ":"he","ほ":"ho",
  "ま":"ma","み":"mi","む":"mu","め":"me","も":"mo",
  "や":"ya","ゆ":"yu","よ":"yo",
  "ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro",
  "わ":"wa","を":"o","ん":"n",
  "が":"ga","ぎ":"gi","ぐ":"gu","げ":"ge","ご":"go",
  "ざ":"za","じ":"ji","ず":"zu","ぜ":"ze","ぞ":"zo",
  "だ":"da","ぢ":"ji","づ":"zu","で":"de","ど":"do",
  "ば":"ba","び":"bi","ぶ":"bu","べ":"be","ぼ":"bo",
  "ぱ":"pa","ぴ":"pi","ぷ":"pu","ぺ":"pe","ぽ":"po",
  "ゔ":"vu",
  "きゃ":"kya","きゅ":"kyu","きょ":"kyo",
  "しゃ":"sha","しゅ":"shu","しょ":"sho",
  "ちゃ":"cha","ちゅ":"chu","ちょ":"cho",
  "にゃ":"nya","にゅ":"nyu","にょ":"nyo",
  "ひゃ":"hya","ひゅ":"hyu","ひょ":"hyo",
  "みゃ":"mya","みゅ":"myu","みょ":"myo",
  "りゃ":"rya","りゅ":"ryu","りょ":"ryo",
  "ぎゃ":"gya","ぎゅ":"gyu","ぎょ":"gyo",
  "じゃ":"ja","じゅ":"ju","じょ":"jo",
  "びゃ":"bya","びゅ":"byu","びょ":"byo",
  "ぴゃ":"pya","ぴゅ":"pyu","ぴょ":"pyo",
  "ふぁ":"fa","ふぃ":"fi","ふぇ":"fe","ふぉ":"fo",
  "うぃ":"wi","うぇ":"we","うぉ":"wo",
  "ゔぁ":"va","ゔぃ":"vi","ゔぇ":"ve","ゔぉ":"vo",
  "てぃ":"ti","でぃ":"di","とぅ":"tou","どぅ":"dou",
  "つぁ":"tsa","つぃ":"tsi","つぇ":"tse","つぉ":"tso",
  "しぇ":"she","じぇ":"je","ちぇ":"che",
};
// 가타카나는 히라가나와 발음 규칙이 같으므로, 대응하는 히라가나 테이블도 채워 재사용
for (const [k, v] of Object.entries({...KANA_ROMAJI})) {
  const code = k.codePointAt(0);
  if (code >= 0x3041 && code <= 0x3096) { // 히라가나 범위
    const kata = String.fromCodePoint(...[...k].map(c => c.codePointAt(0) + 0x60));
    KANA_ROMAJI[kata] = v;
  }
}

function kanaToRomaji(kana) {
  if (!kana) return "";
  let result = "";
  const chars = [...kana];
  for (let i = 0; i < chars.length; i++) {
    const c = chars[i];
    // 장음 부호(ー) — 직전 모음 반복
    if (c === "ー") {
      const last = result.slice(-1);
      result += last;
      continue;
    }
    // 촉음(っ/ッ) — 다음 자음 중복
    if (c === "っ" || c === "ッ") {
      const next2 = chars[i + 1] + (chars[i + 2] || "");
      const nextRomaji = KANA_ROMAJI[chars[i + 1] + chars[i + 2]] || KANA_ROMAJI[chars[i + 1]] || "";
      if (nextRomaji) result += nextRomaji[0];
      continue;
    }
    // 요음(きゃ 등) — 2글자 combo 먼저 시도
    const combo = c + (chars[i + 1] || "");
    if (KANA_ROMAJI[combo]) {
      result += KANA_ROMAJI[combo];
      i++;
      continue;
    }
    if (KANA_ROMAJI[c]) {
      result += KANA_ROMAJI[c];
      continue;
    }
    // 매핑 안 되는 문자(한자·기호 등)는 그대로 통과
    result += c;
  }
  return result;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function isDue(cardState) {
  if (!cardState) return true; // new card
  if (!cardState.due) return true;
  return cardState.due <= todayStr();
}

function buildQueue() {
  const due = [];
  const fresh = [];
  for (const w of words) {
    const s = state[w.id];
    if (!s) fresh.push(w);
    else if (isDue(s)) due.push(w);
  }
  // shuffle due lightly, cap new cards
  fresh.sort(() => Math.random() - 0.5);
  due.sort(() => Math.random() - 0.5);
  queue = due.concat(fresh.slice(0, NEW_CARDS_PER_DAY));
  queue.sort(() => Math.random() - 0.5);
}

function sm2(cardState, quality) {
  let ef = cardState?.ef ?? 2.5;
  let repetitions = cardState?.repetitions ?? 0;
  let interval = cardState?.interval ?? 0;

  if (quality < 3) {
    repetitions = 0;
    interval = 1;
  } else {
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 6;
    else interval = Math.round(interval * ef);
    repetitions += 1;
  }

  ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (ef < 1.3) ef = 1.3;

  const dueDate = new Date();
  dueDate.setDate(dueDate.getDate() + interval);
  const due = dueDate.getFullYear() + "-" + String(dueDate.getMonth() + 1).padStart(2, "0") + "-" + String(dueDate.getDate()).padStart(2, "0");

  return { ef, repetitions, interval, due };
}

function renderCard() {
  const area = document.getElementById("cardArea");
  document.getElementById("remainingCount").textContent = queue.length;

  if (queue.length === 0) {
    area.innerHTML = '<div class="done"><b>오늘 복습 끝!</b>내일 다시 오세요.</div>';
    return;
  }

  current = queue[0];
  revealed = false;

  const showFurigana = current.expression !== current.reading;
  const exprHtml = showFurigana
    ? `<ruby>${current.expression}<rt>${current.reading}</rt></ruby>`
    : current.expression;

  area.innerHTML = `
    <div class="card" id="cardEl">
      <div class="expr">${exprHtml}</div>
      <div class="reading" id="readingEl"></div>
      <div class="meaning" id="meaningEl"></div>
      <button class="play-btn" id="playBtn" style="display:none" aria-label="발음 듣기">🔊</button>
      <div class="hint" id="hintEl">카드를 클릭해 답 보기</div>
    </div>
    <div class="buttons">
      <button class="again" id="btnAgain" disabled title="틀렸거나 전혀 기억 안 남">Again<small>기억 안 남</small></button>
      <button class="hard" id="btnHard" disabled title="맞았지만 헷갈리거나 오래 걸림">Hard<small>헷갈림</small></button>
      <button class="good" id="btnGood" disabled title="적당히 기억나서 맞음 (기본값)">Good<small>기억남</small></button>
      <button class="easy" id="btnEasy" disabled title="보자마자 확신 있게 맞음">Easy<small>바로 맞음</small></button>
    </div>
    <div class="criteria">
      기준은 <b style="color:#94a3b8">정답 여부가 아니라 "얼마나 힘들게 떠올렸나"</b>입니다. 애매하면 Good을 누르세요.
    </div>
  `;

  document.getElementById("cardEl").addEventListener("click", reveal);
  document.getElementById("btnAgain").addEventListener("click", () => answer(0));
  document.getElementById("btnHard").addEventListener("click", () => answer(3));
  document.getElementById("btnGood").addEventListener("click", () => answer(4));
  document.getElementById("btnEasy").addEventListener("click", () => answer(5));
  document.getElementById("playBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    playAudio(current.expression);
  });
}

function reveal() {
  if (revealed) return;
  revealed = true;
  // reading is already shown as furigana on the card front; show romaji(영어 발음) here instead
  document.getElementById("readingEl").textContent = kanaToRomaji(current.reading);
  document.getElementById("meaningEl").textContent = current.meaning;
  document.getElementById("hintEl").textContent = "";
  document.getElementById("playBtn").style.display = "flex";
  for (const id of ["btnAgain", "btnHard", "btnGood", "btnEasy"]) {
    document.getElementById(id).disabled = false;
  }
  playAudio(current.expression);
}

function playAudio(text) {
  const btn = document.getElementById("playBtn");
  btn.classList.add("playing");
  const url = "https://translate.google.com/translate_tts?ie=UTF-8&q=" + encodeURIComponent(text) + "&tl=ja&client=tw-ob&ttsspeed=0.85";
  const audio = new Audio(url);
  audio.addEventListener("ended", () => btn.classList.remove("playing"));
  audio.play().catch(() => {
    // CORS/network block — fall back to browser TTS
    try {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ja-JP";
      utter.onend = () => btn.classList.remove("playing");
      speechSynthesis.speak(utter);
    } catch {
      btn.classList.remove("playing");
    }
  });
}

function answer(quality) {
  const prev = state[current.id];
  state[current.id] = sm2(prev, quality);
  saveState();
  queue.shift();
  renderCard();
  renderStats();
}

function renderStats() {
  let newCount = 0, learningCount = 0, matureCount = 0;
  for (const w of words) {
    const s = state[w.id];
    if (!s) newCount++;
    else if (s.interval >= MATURE_DAYS) matureCount++;
    else learningCount++;
  }
  const total = words.length || 1;
  document.getElementById("statNew").textContent = newCount;
  document.getElementById("statLearning").textContent = learningCount;
  document.getElementById("statMature").textContent = matureCount;
  document.getElementById("statMaturePct").textContent = Math.round((matureCount / total) * 100) + "%";
  document.getElementById("barMature").style.width = (matureCount / total) * 100 + "%";
  document.getElementById("barLearning").style.width = (learningCount / total) * 100 + "%";
  document.getElementById("barNew").style.width = (newCount / total) * 100 + "%";
}

async function init() {
  const res = await fetch("일본어_기초_어휘.json");
  words = await res.json();
  state = loadState();
  document.getElementById("totalCount").textContent = words.length;
  buildQueue();
  renderCard();
  renderStats();
}

init();
</script>
</body>
</html>
