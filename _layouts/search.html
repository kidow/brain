<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% include head-custom.html %}
  <style>
    :root { color: #24292f; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; }
    .search-page { box-sizing: border-box; max-width: 800px; margin: 0 auto; padding: 3rem 1.25rem 4rem; }
    .eyebrow { margin: 0 0 .35rem; color: #57606a; font-weight: 600; letter-spacing: .04em; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 2.75rem); }
    .description { margin: .65rem 0 2rem; color: #57606a; }
    .search-form { display: flex; gap: .6rem; }
    .search-form input { min-width: 0; flex: 1; padding: .75rem .9rem; border: 1px solid #d0d7de; border-radius: .45rem; font: inherit; }
    button { border: 1px solid #d0d7de; border-radius: .45rem; padding: .6rem .8rem; background: #f6f8fa; color: inherit; font: inherit; cursor: pointer; }
    .search-form button { border-color: #0969da; background: #0969da; color: #fff; }
    .search-controls { display: flex; flex-wrap: wrap; justify-content: space-between; gap: .75rem; margin: 1.35rem 0; }
    .filters { display: flex; flex-wrap: wrap; gap: .45rem; }
    .filter.is-active { border-color: #0969da; background: #ddf4ff; color: #0550ae; }
    .status { margin: .45rem 0 0; color: #57606a; font-size: .92rem; }
    .results { display: grid; gap: .75rem; margin: 0; padding: 0; list-style: none; }
    .result { border: 1px solid #d0d7de; border-radius: .55rem; padding: 1rem; }
    .result a { color: #0969da; font-size: 1.05rem; font-weight: 600; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    .type { display: inline-block; margin-left: .5rem; color: #57606a; font-size: .82rem; }
    .snippet { margin: .55rem 0 0; color: #57606a; line-height: 1.55; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; }
    @media (max-width: 600px) { .search-page { padding: 2rem 1rem 3rem; } .search-form { align-items: stretch; flex-direction: column; } .search-controls { display: block; } .status { margin-top: .9rem; } }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
